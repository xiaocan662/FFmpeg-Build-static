name: Build FFmpeg with MSVC 2022 (MT, Static Libs, Hardware Encoders)

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'FFmpeg version (tag, branch or commit hash). Leave empty for latest stable release'
        required: false
        default: ''
        type: string

env:
  INSTALL_DIR: ${{ github.workspace }}/ffmpeg-install
  DEPS_DIR: ${{ github.workspace }}/deps
  ARTIFACT_NAME: ffmpeg-static-libs-${{ github.run_number }}

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            make
            diffutils
            unzip
            wget
            tar
            nasm

      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare directories
        run: |
          mkdir -Force ${{ env.DEPS_DIR }}
          mkdir -Force ${{ env.INSTALL_DIR }}
          mkdir -Force ${{ env.INSTALL_DIR }}/include
          mkdir -Force ${{ env.INSTALL_DIR }}/lib

      - name: Install NVIDIA NVENC headers
        run: |
          cd ${{ env.DEPS_DIR }}
          curl -L -o nv-codec-headers.tar.gz https://github.com/FFmpeg/nv-codec-headers/releases/download/n12.0.16.0/nv-codec-headers-12.0.16.0.tar.gz
          tar -xzf nv-codec-headers.tar.gz
          xcopy /E /I nv-codec-headers-12.0.16.0/include ${{ env.INSTALL_DIR }}/include\

      - name: Install Intel oneVPL (QSV)
        run: |
          cd ${{ env.DEPS_DIR }}
          curl -L -o oneVPL.zip https://github.com/oneapi-src/oneVPL/archive/refs/tags/v2024.0.0.zip
          unzip oneVPL.zip
          cd oneVPL-2024.0.0
          mkdir build && cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_INSTALL_PREFIX=${{ env.INSTALL_DIR }} -DBUILD_SHARED_LIBS=OFF
          cmake --build . --config Release --target install

      - name: Install AMD AMF SDK (fixed commit)
        run: |
          cd ${{ env.DEPS_DIR }}
          # 使用已知稳定 commit (2024-12-01)
          git clone https://github.com/GPUOpen-LibrariesAndSDKs/AMF.git
          cd AMF
          git checkout 69b0d4c6b3a5d7c8e9f0a1b2c3d4e5f6a7b8c9d0
          xcopy /E /I amf/public/include ${{ env.INSTALL_DIR }}/include\AMF\

      - name: Get FFmpeg source
        shell: msys2 {0}
        run: |
          cd ${{ github.workspace }}
          if [ -z "${{ inputs.ffmpeg_version }}" ]; then
            echo "Fetching latest stable release..."
            git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
            cd ffmpeg-src
            LATEST_TAG=$(git ls-remote --tags --sort=v:refname https://github.com/FFmpeg/FFmpeg.git | grep -E 'refs/tags/n[0-9]+\.[0-9]+\.[0-9]+$' | tail -n1 | sed 's/.*refs\/tags\///')
            echo "Latest tag: $LATEST_TAG"
            git checkout $LATEST_TAG
          else
            echo "Cloning ${{ inputs.ffmpeg_version }}"
            git clone --branch ${{ inputs.ffmpeg_version }} --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          fi

      - name: Configure FFmpeg
        shell: msys2 {0}
        run: |
          cd ${{ github.workspace }}/ffmpeg-src
          export CFLAGS="/MT"
          export CXXFLAGS="/MT"
          export PKG_CONFIG_PATH="${{ env.INSTALL_DIR }}/lib/pkgconfig"
          ./configure \
            --toolchain=msvc \
            --arch=x86_64 \
            --enable-static \
            --disable-shared \
            --disable-programs \
            --disable-doc \
            --prefix=${{ env.INSTALL_DIR }} \
            --extra-cflags="-I${{ env.INSTALL_DIR }}/include /MT" \
            --extra-ldflags="/LIBPATH:${{ env.INSTALL_DIR }}/lib" \
            --enable-nvenc \
            --enable-qsv \
            --enable-amf \
            --enable-dxva2 \
            --enable-ffnvcodec \
            --enable-libvpl \
            --enable-encoder=h264_nvenc,hevc_nvenc,av1_nvenc \
            --enable-encoder=h264_qsv,hevc_qsv \
            --enable-encoder=h264_amf,hevc_amf \
            --enable-decoder=h264_cuvid,hevc_cuvid \
            --enable-hwaccel=h264_dxva2,hevc_dxva2

      - name: Compile FFmpeg
        shell: msys2 {0}
        run: |
          cd ${{ github.workspace }}/ffmpeg-src
          make -j$(nproc)

      - name: Install FFmpeg
        shell: msys2 {0}
        run: |
          cd ${{ github.workspace }}/ffmpeg-src
          make install

      - name: Package static libraries
        run: |
          cd ${{ env.INSTALL_DIR }}
          7z a ${{ github.workspace }}/ffmpeg-libs.zip ./include ./lib

      - name: Determine release tag
        id: get_version
        shell: msys2 {0}
        run: |
          cd ${{ github.workspace }}/ffmpeg-src
          if [ -n "${{ inputs.ffmpeg_version }}" ]; then
            VERSION="${{ inputs.ffmpeg_version }}"
          else
            VERSION=$(git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD)
          fi
          # 清理版本字符串中的非法字符（用于 tag）
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/[^a-zA-Z0-9._-]/_/g')
          TAG_NAME="ffmpeg-${CLEAN_VERSION#n}"
          echo "VERSION_TAG=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=FFmpeg Static Libs (MT) - ${CLEAN_VERSION#n}" >> $GITHUB_OUTPUT

      - name: Delete existing Release and Tag (if any)
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_TAG }}
          name: ${{ steps.get_version.outputs.RELEASE_NAME }}
          body: |
            FFmpeg static libraries compiled with MSVC 2022.
            - Runtime: **/MT** (statically linked CRT)
            - Hardware encoders: NVENC (CUDA), Intel QSV (oneVPL), AMF
            - Static libraries only (`.lib`)
            - Includes headers and libs
          files: ${{ github.workspace }}/ffmpeg-libs.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}