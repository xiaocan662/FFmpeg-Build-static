name: Build FFmpeg Static (MSVC2022 + NVENC/QSV/AMF + MT)
on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg 版本/分支
        required: false
        type: string
      release_tag:
        description: Release 标签
        default: ffmpeg-hwenc-static-latest
        type: string

env:
  D_WORK_ROOT: D:\ffmpeg-build
  FFMPEG_PREFIX: D:\ffmpeg-build\ffmpeg-output
  # 统一临时目录，避免系统临时盘权限/空间问题
  TMP: D:\ffmpeg-build\tmp
  TEMP: D:\ffmpeg-build\tmp

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 加载 MSVC x64 环境（必须在最前）
      - name: Init MSVC 2022 x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.4

      # 安装全套编译依赖
      - name: Install build tools
        run: |
          choco install nasm yasm perl git make --no-progress
          refreshenv

      # 确定 FFmpeg 分支
      - name: Set FFmpeg ref
        id: set_ref
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.ffmpeg_ref }}" -eq "") {
            echo "ffmpeg_ref=master" >> $env:GITHUB_OUTPUT
          } else {
            echo "ffmpeg_ref=${{ github.event.inputs.ffmpeg_ref }}" >> $env:GITHUB_OUTPUT
          }

      # 创建 D 盘目录 + 临时目录
      - name: Prepare dirs
        run: |
          mkdir "%D_WORK_ROOT%"
          mkdir "%TMP%"
          rmdir /s /q "%FFMPEG_PREFIX%" 2>nul
          cd /d "%D_WORK_ROOT%"

      # 拉取源码
      - name: Clone FFmpeg
        run: |
          git clone --depth 1 --branch ${{ steps.set_ref.outputs.ffmpeg_ref }} https://git.ffmpeg.org/ffmpeg.git ffmpeg-src

      # 配置：移除 CFLAGS 里的 -MT，仅 LDFLAGS 加 -MT
      # 开启 --enable-cross-compile 适配 Windows MSVC 交叉检测告警
      - name: Configure FFmpeg
        working-directory: %D_WORK_ROOT%\ffmpeg-src
        run: |
          set "CFLAGS="
          set "CXXFLAGS="
          set "LDFLAGS=-MT"
          ./configure --toolchain=msvc ^
          --enable-cross-compile ^
          --enable-static ^
          --disable-shared ^
          --enable-nvenc ^
          --enable-libmfx ^
          --enable-amf ^
          --enable-d3d11va ^
          --enable-dxva2 ^
          --disable-programs ^
          --disable-ffmpeg ^
          --disable-ffplay ^
          --disable-ffprobe ^
          --disable-doc ^
          --disable-debug ^
          --enable-runtime-cpudetect ^
          --prefix=%FFMPEG_PREFIX%

      # 编译 & 安装
      - name: Build & Install
        working-directory: %D_WORK_ROOT%\ffmpeg-src
        run: |
          make -j%NUMBER_OF_PROCESSORS%
          make install

      # 打包
      - name: Archive
        shell: pwsh
        run: |
          Compress-Archive -Path ${{ env.FFMPEG_PREFIX }}\* -DestinationPath ${{ github.workspace }}\ffmpeg-msvc2022-x64-static.zip -Force

      # 上传制品
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-static-libs
          path: ffmpeg-msvc2022-x64-static.zip
          retention-days: 30

      # 创建标签
      - name: Create Tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -f $tag
          git push origin -f $tag

      # 发布 Release
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: FFmpeg Static (MSVC2022 x64 + 硬件编解码 + MT)
          body: |
            编译信息
            - 编译器: MSVC 2022 v14.4 x64
            - 运行时: MT 静态运行时库
            - 编码: NVENC / QSV(libmfx) / AMF
            - 解码: D3D11VA / DXVA2
            - 音频: 原生支持 WASAPI
            - 架构: x64 纯静态库
            - FFmpeg 版本: ${{ steps.set_ref.outputs.ffmpeg_ref }}
          files: ffmpeg-msvc2022-x64-static.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}