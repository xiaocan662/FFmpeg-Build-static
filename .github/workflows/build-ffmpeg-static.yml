name: Build FFmpeg Static (MSVC2022 + NVENC/QSV/AMF + MT)

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg 版本/分支/标签 (留空使用 master)
        required: false
        type: string
      release_tag:
        description: Git Release 标签名
        default: ffmpeg-hwenc-static-latest
        type: string

env:
  D_WORK_ROOT: D:\ffmpeg-build
  FFMPEG_PREFIX: D:\ffmpeg-build\ffmpeg-output
  TMP: D:\ffmpeg-build\tmp
  TEMP: D:\ffmpeg-build\tmp

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC 2022 x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.4

      - name: Install build tools
        run: choco install nasm yasm perl git make --no-progress && refreshenv

      - name: Resolve FFmpeg ref
        id: set_ref
        shell: pwsh
        run: |
          $input_ref = "${{ github.event.inputs.ffmpeg_ref }}".Trim()
          if ($input_ref -eq "") {
            $target_ref = "master"
          } else {
            $target_ref = $input_ref
          }
          echo "ffmpeg_ref=$target_ref" >> $env:GITHUB_OUTPUT

      - name: Prepare directories
        run: if not exist "%D_WORK_ROOT%" mkdir "%D_WORK_ROOT%" && if not exist "%TMP%" mkdir "%TMP%" && if exist "%FFMPEG_PREFIX%" rmdir /s /q "%FFMPEG_PREFIX%" && cd /d "%D_WORK_ROOT%"

      - name: Clone FFmpeg source
        run: git clone --depth 1 --branch ${{ steps.set_ref.outputs.ffmpeg_ref }} https://git.ffmpeg.org/ffmpeg.git ffmpeg-src

      - name: Configure FFmpeg
        working-directory: %D_WORK_ROOT%\ffmpeg-src
        run: set "CFLAGS=" && set "CXXFLAGS=" && set "LDFLAGS=-MT" && ./configure --toolchain=msvc --enable-cross-compile --enable-static --disable-shared --enable-nvenc --enable-libmfx --enable-amf --enable-d3d11va --enable-dxva2 --disable-programs --disable-ffmpeg --disable-ffplay --disable-ffprobe --disable-doc --disable-debug --enable-runtime-cpudetect --prefix=%FFMPEG_PREFIX%

      - name: Build and Install
        working-directory: %D_WORK_ROOT%\ffmpeg-src
        run: make -j%NUMBER_OF_PROCESSORS% && make install

      - name: Archive output files
        shell: pwsh
        run: |
          $zipPath = Join-Path "${{ github.workspace }}" "ffmpeg-msvc2022-x64-static.zip"
          Compress-Archive -Path "${{ env.FFMPEG_PREFIX }}\*" -DestinationPath $zipPath -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-static-libs
          path: ffmpeg-msvc2022-x64-static.zip
          retention-days: 30

      - name: Create Git Tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -f $tag
          git push origin -f $tag

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: FFmpeg Static (MSVC2022 x64 + 硬件编解码 + MT)
          body: |
            ### 编译信息
            - 编译器: MSVC 2022 v14.4 (x64)
            - 运行库: MT 静态多线程
            - 硬件编码: NVENC / QSV(libmfx) / AMF
            - 硬件解码: D3D11VA / DXVA2
            - 音频: 原生支持 WASAPI (avdevice)
            - 类型: MSVC 纯静态库 (header + lib)
            - FFmpeg 版本: ${{ steps.set_ref.outputs.ffmpeg_ref }}
          files: ffmpeg-msvc2022-x64-static.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}