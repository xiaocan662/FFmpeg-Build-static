name: Build FFmpeg Static (MSVC2022 + WASAPI + NVENC/QSV/AMF + MT)

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg 版本/标签/分支 (留空 = 拉取最新 master 主干)
        required: false
        type: string
      release_tag:
        description: Release 标签名称
        default: ffmpeg-wasapi-hwenc-static-latest
        type: string

env:
  D_WORK_ROOT: D:/ffmpeg-build
  FFMPEG_PREFIX: D:/ffmpeg-build/ffmpeg-output

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 先安装 MSYS2 & 编译依赖
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: base-devel nasm yasm perl git

      # 2. 加载 MSVC2022 编译器（关键：给 FFmpeg msvc 工具链使用）
      - name: Setup MSVC 2022
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.4

      # 判定 FFmpeg 分支
      - name: Set FFmpeg checkout ref
        id: set_ref
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.ffmpeg_ref }}" -eq "") {
            echo "ffmpeg_ref=master" >> $env:GITHUB_OUTPUT
          } else {
            echo "ffmpeg_ref=${{ github.event.inputs.ffmpeg_ref }}" >> $env:GITHUB_OUTPUT
          }

      # 创建D盘目录 + 拉取源码
      - name: Clone FFmpeg source
        shell: msys2 {0}
        run: |
          mkdir -p ${{ env.D_WORK_ROOT }}
          cd ${{ env.D_WORK_ROOT }}
          git clone --depth 1 --branch ${{ steps.set_ref.outputs.ffmpeg_ref }} https://git.ffmpeg.org/ffmpeg.git ffmpeg-src

      # FFmpeg 配置：MSVC + MT 静态运行时 + 功能全开
      - name: Configure FFmpeg
        shell: msys2 {0}
        working-directory: ${{ env.D_WORK_ROOT }}/ffmpeg-src
        run: |
          export CFLAGS="-MT"
          export CXXFLAGS="-MT"
          export LDFLAGS="-MT"
          ./configure \
            --toolchain=msvc \
            --enable-static \
            --disable-shared \
            --enable-wasapi \
            --enable-nvenc \
            --enable-qsv \
            --enable-amf \
            --enable-d3d11va \
            --enable-dxva2 \
            --disable-programs \
            --disable-ffmpeg \
            --disable-ffplay \
            --disable-ffprobe \
            --disable-doc \
            --disable-debug \
            --enable-runtime-cpudetect \
            --prefix=${{ env.FFMPEG_PREFIX }}

      # 编译 & 安装
      - name: Build & Install FFmpeg
        shell: msys2 {0}
        working-directory: ${{ env.D_WORK_ROOT }}/ffmpeg-src
        run: |
          make -j$(nproc)
          make install

      # 打包（PowerShell 压缩）
      - name: Archive artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path ${{ env.FFMPEG_PREFIX }}\* -DestinationPath ${{ github.workspace }}\ffmpeg-wasapi-hwenc-msvc2022-x64.zip -Force

      # 上传制品
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-static-hw-libs
          path: ffmpeg-wasapi-hwenc-msvc2022-x64.zip
          retention-days: 30

      # 创建 Git 标签
      - name: Create Git Tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -f $tag
          git push origin -f $tag

      # 发布 Release
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: FFmpeg Static (MSVC2022 x64 + WASAPI + 全硬件编码 + MT)
          body: |
            ## 编译信息
            - 编译器: MSVC 2022 (v14.4)
            - 架构: x64
            - 运行时: MT 静态多线程运行时库
            - 音频: WASAPI
            - 硬件编码: NVENC / QSV / AMF
            - 硬件解码: D3D11VA / DXVA2
            - 类型: MSVC 纯静态库 (lib + header)
            - FFmpeg 版本/分支: ${{ steps.set_ref.outputs.ffmpeg_ref }}
          files: ffmpeg-wasapi-hwenc-msvc2022-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}